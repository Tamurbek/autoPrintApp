name: Build & Release (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Download VC++ Redistributable
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "windows/vc_redist.x64.exe"

      - name: Verify build output
        shell: pwsh
        run: |
          if (-Not (Test-Path "build/windows/x64/runner/Release/autoprint.exe")) {
            Write-Error "Build output not found!"
            exit 1
          }

      - name: Get Version from pubspec.yaml
        id: get_version
        shell: pwsh
        run: |
          $versionLine = Get-Content pubspec.yaml | Select-String "^version: "
          $version = $versionLine.ToString().Split(":")[1].Trim().Split("+")[0]
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Create Installer (Inno Setup)
        shell: pwsh
        run: iscc /DMyAppVersion=${{ steps.get_version.outputs.VERSION }} windows/installer.iss

      - name: Upload Windows Setup
        uses: actions/upload-artifact@v4
        with:
          name: autoprint-windows-setup
          path: build/windows/x64/runner/Release/installer/AutoPrint_Setup.exe

  create-release:
    name: Create Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows Setup
        uses: actions/download-artifact@v4
        with:
          name: autoprint-windows-setup
          path: bin-windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin-windows/AutoPrint_Setup.exe
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
